# SUMO + DQN config tailored for VN intersections
sumo:
  # Path to your SUMO scenario config (.sumocfg)
  sumocfg_path: data/scenarios/hn_sample/config.sumocfg
  # Traffic light id to control
  tls_id: c
  # Map your TLS program so action index corresponds to a phase index
  phases: [0, 1, 2, 3]
  step_length: 1.0
  action_duration: 5
  min_phase_duration: 5    # giây — global fallback tối thiểu (khi pha không có trong per-phase)
  max_phase_duration: 140  # giây — global fallback tối đa

  # Per-phase green constraints (giây) — ghi đè global min/max_phase_duration
  # Pha 0 = NS xanh (trục phụ), Pha 2 = EW xanh (trục chính)
  phase_green_min:
    0: 30    # NS xanh tối thiểu 30s (6 bước)
    2: 60    # EW xanh tối thiểu 60s (12 bước)
  phase_green_max:
    0: 70    # NS xanh tối đa 70s (14 bước)
    2: 140   # EW xanh tối đa 140s (28 bước)
  max_steps: 3600
  warmup_steps: 60
  gui: false

  # Fixed-Time controller phase schedule (danh sách [phase_idx, duration_s])
  # Chu kỳ 160s bất đối xứng: EW xanh 100s -> EW vàng 5s -> NS xanh 50s -> NS vàng 5s
  fixed_time_phase_schedule:
    - [2, 100]   # Pha 2: EW xanh 100s (trục chính)
    - [3,   5]   # Pha 3: EW vàng 5s
    - [0,  50]   # Pha 0: NS xanh 50s (trục phụ)
    - [1,   5]   # Pha 1: NS vàng 5s

# Vietnamese vehicle weighting to reflect motorcycle prevalence
vn_weights:
  motorcycle: 0.5  # Sửa: 1.0 → 0.5 (1 ô tô = 3 xe máy theo chuẩn PCU thực tế VN)
  car: 1.5          # Sửa: 1.0 → 1.5 (ô tô chiếm diện tích lớn hơn xe máy)
  bus: 2.0
  truck: 2.0

reward:
  type: queue_delay  # or throughput

train:
  total_steps: 200000
  start_train: 10000
  train_every: 1
  replay_size: 100000
  batch_size: 64
  gamma: 0.99
  lr: 0.0005
  tau: 1.0
  target_update_interval: 2000
  double_dqn: true
  grad_clip: 10.0

explore:
  eps_start: 1.0
  eps_end: 0.05
  eps_steps: 100000

output_dir: outputs
